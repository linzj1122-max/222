name: Codex compatibility fixes

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/codex-compat-fixes.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply frontend compatibility fixes
        shell: python
        run: |
          from pathlib import Path

          def replace(path, old, new, required=True):
              p = Path(path)
              text = p.read_text(encoding="utf-8")
              if old not in text:
                  if required:
                      raise SystemExit(f"missing pattern in {path}: {old[:80]!r}")
                  return False
              p.write_text(text.replace(old, new), encoding="utf-8")
              return True

          main = Path("scripts/main.js")
          text = main.read_text(encoding="utf-8")
          text = text.replace("crypto.randomUUID()", "uid()")
          if "const uid = () =>" not in text:
              text = text.replace(
                  "const initialProducts = [",
                  "const uid = () => (globalThis.crypto?.randomUUID ? globalThis.crypto.randomUUID() : \"id-\" + Date.now() + \"-\" + Math.random().toString(16).slice(2));\n\nconst initialProducts = [",
                  1,
              )
          main.write_text(text, encoding="utf-8")

          for path in ["scripts/listing.js", "scripts/ai-studio.js"]:
              replace(
                  path,
                  "const uid = () => (crypto.randomUUID ? crypto.randomUUID() : \"id-\" + Date.now() + \"-\" + Math.random().toString(16).slice(2));",
                  "const uid = () => (globalThis.crypto?.randomUUID ? globalThis.crypto.randomUUID() : \"id-\" + Date.now() + \"-\" + Math.random().toString(16).slice(2));",
              )

          replace(
              "scripts/sourcing.js",
              "const uid = () =>\n    (crypto.randomUUID ? crypto.randomUUID() : \"id-\" + Date.now() + \"-\" + Math.random().toString(16).slice(2));",
              "const uid = () =>\n    (globalThis.crypto?.randomUUID ? globalThis.crypto.randomUUID() : \"id-\" + Date.now() + \"-\" + Math.random().toString(16).slice(2));",
          )

          promo = Path("scripts/promotions.js")
          text = promo.read_text(encoding="utf-8")
          if "const byDataAttr = (name, value) =>" not in text:
              text = text.replace(
                  "  const $ = (id) => document.getElementById(id);\n",
                  "  const $ = (id) => document.getElementById(id);\n  const byDataAttr = (name, value) =>\n    Array.from(document.querySelectorAll(`[${name}]`)).find((el) => el.getAttribute(name) === String(value)) || null;\n",
                  1,
              )
          text = text.replace(
              'const price = amount(document.querySelector(`[data-promo-price="${CSS.escape(key)}"]`)?.value);',
              'const price = amount(byDataAttr("data-promo-price", key)?.value);',
          )
          text = text.replace(
              'const input = document.querySelector(`[data-promo-price="${CSS.escape(key)}"]`);',
              'const input = byDataAttr("data-promo-price", key);',
          )
          promo.write_text(text, encoding="utf-8")

          listing = Path("scripts/listing.js")
          text = listing.read_text(encoding="utf-8")
          if "const byDataAttr = (root, selector, name, value) =>" not in text:
              text = text.replace(
                  "  const uid = () => (globalThis.crypto?.randomUUID ? globalThis.crypto.randomUUID() : \"id-\" + Date.now() + \"-\" + Math.random().toString(16).slice(2));\n",
                  "  const uid = () => (globalThis.crypto?.randomUUID ? globalThis.crypto.randomUUID() : \"id-\" + Date.now() + \"-\" + Math.random().toString(16).slice(2));\n  const byDataAttr = (root, selector, name, value) =>\n    Array.from(root.querySelectorAll(selector)).find((el) => el.getAttribute(name) === String(value)) || null;\n",
                  1,
              )
          text = text.replace(
              'const select = box.querySelector(`select[data-attr-id="${CSS.escape(id)}"]`);',
              'const select = byDataAttr(box, "select[data-attr-id]", "data-attr-id", id);',
          )
          text = text.replace(
              'const btn = document.querySelector(`[data-draft-check-status="${CSS.escape(draftId)}"]`);',
              'const btn = byDataAttr(document, "[data-draft-check-status]", "data-draft-check-status", draftId);',
          )
          listing.write_text(text, encoding="utf-8")
      - name: Commit changes and remove workflow
        shell: bash
        run: |
          git rm .github/workflows/codex-compat-fixes.yml
          if git diff --cached --quiet && git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "codex-app[bot]"
          git config user.email "codex-app[bot]@users.noreply.github.com"
          git add scripts/main.js scripts/promotions.js scripts/listing.js scripts/ai-studio.js scripts/sourcing.js
          git commit -m "Fix frontend compatibility fallbacks"
          git push
