name: Codex WB semi-auto listing patch

on:
  push:
    paths:
      - .github/workflows/codex-wb-semi-auto.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply WB listing changes
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const files = {
            listing: 'scripts/listing.js',
            api: 'functions/api/listing/[[path]].js',
            css: 'styles/main.css',
          };
          function read(path) { return fs.readFileSync(path, 'utf8'); }
          function write(path, text) { fs.writeFileSync(path, text); }
          function mustReplace(text, search, replacement, label) {
            if (!text.includes(search)) throw new Error(`Missing ${label}`);
            return text.replace(search, replacement);
          }
          function replaceRegex(text, regex, replacement, label) {
            if (!regex.test(text)) throw new Error(`Missing ${label}`);
            return text.replace(regex, replacement);
          }

          let listing = read(files.listing);
          if (!listing.includes('const isWBPlatform =')) {
            listing = mustReplace(listing, '  let listingStores = [];\n', '  let listingStores = [];\n  const isWBPlatform = (platform = draft.platform) => String(platform || "").toLowerCase() === "wb";\n', 'isWBPlatform insertion');
          }
          listing = replaceRegex(listing, /  function calculateGuooPricing\(\) \{[\s\S]*?\n  \}\n\n  \/\/ ---- 草稿状态/, `  function dimensionsForPricing(source) {\n    const dims = [toNumber(source.length), toNumber(source.width), toNumber(source.height)].map((mm) => mm / 10).filter((cm) => cm > 0);\n    const sorted = [...dims].sort((a, b) => b - a);\n    return { dims, longest: sorted[0] || 0, second: sorted[1] || 0, third: sorted[2] || 0, sum: dims.reduce((a, b) => a + b, 0) };\n  }\n\n  function calculateGuooPricingFor(source) {\n    const inputs = {\n      purchaseCost: toNumber(source.purchaseCost),\n      targetGrossRate: Math.max(0, toNumber(source.targetGrossRate || 65) / 100),\n      commissionRate: Math.max(0, toNumber(source.commissionRate || 12) / 100),\n      exchangeRate: toNumber(source.exchangeRate || 11.5),\n      kg: toNumber(source.weight) / 1000,\n      dim: dimensionsForPricing(source),\n    };\n    if (!inputs.purchaseCost || !inputs.kg || !inputs.exchangeRate) {\n      return { ok: false, error: "请填写采购成本、重量和汇率。" };\n    }\n    if (inputs.targetGrossRate < 0.65) inputs.targetGrossRate = 0.65;\n    const candidates = GUOO_RFBS_STANDARD.map((scheme) => solvePriceForScheme(scheme, inputs)).filter(Boolean);\n    if (!candidates.length) return { ok: false, error: "未找到满足 GUOO realFBS 限制且毛利率≥65%的方案,请检查价格区间/重量/尺寸。" };\n    candidates.sort((a, b) => a.minimumPriceRmb - b.minimumPriceRmb);\n    const best = candidates[0];\n    return { ok: true, ...best, targetGrossRate: inputs.targetGrossRate, exchangeRate: inputs.exchangeRate, purchaseCost: inputs.purchaseCost, kg: inputs.kg, dim: inputs.dim };\n  }\n\n  function applyPricingToDraft(target) {\n    const result = calculateGuooPricingFor(target);\n    target.pricingResult = result;\n    if (!result.ok) return false;\n    const minimumPrice = Number(result.minimumPriceRmb || result.priceRmb || 0);\n    const recommendedPrice = Number(result.recommendedPriceRmb || minimumPrice * 2 || 0);\n    target.price = recommendedPrice.toFixed(2);\n    target.oldPrice = (Math.ceil(recommendedPrice * 2 * 100) / 100).toFixed(2);\n    return true;\n  }\n\n  function calculateGuooPricing() {\n    readStep2Form();\n    return calculateGuooPricingFor(draft);\n  }\n\n  // ---- 草稿状态`, 'pricing functions');
          listing = mustReplace(listing, '      categoryId: Number(item.categoryId || 0),', '      categoryId: Number(item.categoryId || item.subjectID || item.subjectId || item.objectID || item.id || 0),', 'makeLeaf categoryId');
          if (!listing.includes('function canPublishCategoryNode')) {
            listing = mustReplace(listing, '  const CAT_CACHE_VERSION = 7;', '  function canPublishCategoryNode(node) {\n    const isTerminal = !(node?.children && node.children.length);\n    if (!isTerminal) return false;\n    const leaf = node.leaf || {};\n    if (isWBPlatform()) return Number(leaf.categoryId || leaf.origId || node.id || 0) > 0;\n    return Number(leaf.categoryId || 0) > 0 && Number(leaf.typeId || 0) > 0;\n  }\n\n  const CAT_CACHE_VERSION = 8;', 'category helper');
          } else {
            listing = listing.replace('  const CAT_CACHE_VERSION = 7;', '  const CAT_CACHE_VERSION = 8;');
          }
          listing = listing.replaceAll('const canPublish = isTerminal && Number(n.leaf?.categoryId || 0) > 0 && Number(n.leaf?.typeId || 0) > 0;', 'const canPublish = canPublishCategoryNode(n);');
          listing = listing.replaceAll('const canPublish = !hasChild && Number(node.leaf?.categoryId || 0) > 0 && Number(node.leaf?.typeId || 0) > 0;', 'const canPublish = canPublishCategoryNode(node);');
          listing = listing.replaceAll('const canPublish = isLeaf && Number(x.node.leaf?.categoryId || 0) > 0 && Number(x.node.leaf?.typeId || 0) > 0;', 'const canPublish = canPublishCategoryNode(x.node);');
          listing = listing.replaceAll('const canPublish = isLeaf && Number(node.leaf?.categoryId || 0) > 0 && Number(node.leaf?.typeId || 0) > 0;', 'const canPublish = canPublishCategoryNode(node);');
          listing = listing.replace('if (!leaf.fullPath || !Number(leaf.categoryId || 0) || !Number(leaf.typeId || 0)) {', 'if (!leaf.fullPath || !Number(leaf.categoryId || 0) || (!isWBPlatform() && !Number(leaf.typeId || 0))) {');
          if (!listing.includes('WB uses the selected subject plus product fields')) {
            listing = mustReplace(listing, '    const key = attrCategoryKey();\n    if (!draft.descriptionCategoryId || !draft.typeId) {', '    const key = attrCategoryKey();\n    if (isWBPlatform()) {\n      currentAttributes = [];\n      attrValues = {};\n      draft.attrDefinitions = [];\n      draft.attrValues = {};\n      draft.attrCategoryKey = key || String(draft.categoryId || "");\n      if (box) box.innerHTML = `<div class="table-status">WB uses the selected subject plus product fields for card creation. Fill SKU, title, price, weight and images, then publish.</div>`;\n      if (status) status.textContent = "WB category selected. No Ozon attribute template is required.";\n      return;\n    }\n    if (!draft.descriptionCategoryId || !draft.typeId) {', 'WB attr skip');
          }
          listing = mustReplace(listing, '  function validateRequiredAttrs() {\n    const missing = currentAttributes.filter((a) => {', '  function validateRequiredAttrs() {\n    if (isWBPlatform()) return true;\n    const missing = currentAttributes.filter((a) => {', 'WB attr validation skip');
          listing = replaceRegex(listing, /  function updateAutomaticPricing\(silent = true\) \{[\s\S]*?\n  \}\n\n  function runGuooPricing/, `  function updateAutomaticPricing(silent = true) {\n    readStep2Form();\n    if (!applyPricingToDraft(draft)) {\n      renderPricingResult();\n      if (!silent) alert(draft.pricingResult?.error || "Pricing failed");\n      persistDraft();\n      return false;\n    }\n    fillStep2Form();\n    persistDraft();\n    return true;\n  }\n\n  function runGuooPricing`, 'updateAutomaticPricing');
          if (!listing.includes('listing-package-import')) {
            listing = mustReplace(listing, '          <div class="listing-draft-tools" id="lst_draftTools" hidden>\n          </div>\n        </div>\n        <div id="lst_draftList"></div>', '          <div class="listing-draft-tools" id="lst_draftTools" hidden>\n          </div>\n        </div>\n        <div class="listing-package-import">\n          <div class="toolbar">\n            <div>\n              <h4>商品包导入</h4>\n              <p class="section-note">上传 Excel/CSV 和商品图片，系统按货号匹配图片并自动计算价格，生成可勾选发布的草稿。</p>\n            </div>\n          </div>\n          <div class="cols-2">\n            <label>商品表格<input id="lst_batchFile" type="file" accept=".xlsx,.xls,.csv" /></label>\n            <label>商品图片<input id="lst_batchImages" type="file" accept="image/*" multiple webkitdirectory /></label>\n          </div>\n          <div class="actions">\n            <label class="inline-check"><input id="lst_draftSelectAll" type="checkbox" /> 全选草稿</label>\n            <button class="secondary" type="button" id="lst_batchImport">导入商品包</button>\n            <button class="primary" type="button" id="lst_batchPublish">批量发布选中</button>\n            <button class="secondary" type="button" id="lst_draftClearSel">取消选择</button>\n            <button class="danger" type="button" id="lst_draftDelSelected">删除选中</button>\n          </div>\n          <div class="listing-import-report" id="lst_importReport"></div>\n        </div>\n        <div id="lst_draftList"></div>', 'package import UI');
          }
          listing = mustReplace(listing, '    if (tools) tools.hidden = true;\n    selectedDrafts.clear();', '    if (tools) tools.hidden = false;\n    const selectAll = $("lst_draftSelectAll");\n    if (selectAll) selectAll.checked = drafts.length > 0 && selectedDrafts.size === drafts.length;', 'draft selection preservation');
          listing = mustReplace(listing, '      return `<div class="listing-draft-row">\n        <span class="listing-draft-info">', '      return `<div class="listing-draft-row ${selectedDrafts.has(d.id) ? "is-selected" : ""}">\n        <label class="inline-check"><input type="checkbox" data-draft-check="${escapeAttr(d.id)}" ${selectedDrafts.has(d.id) ? "checked" : ""} /></label>\n        <span class="listing-draft-info">', 'draft checkbox');
          listing = mustReplace(listing, '      description: String(rowValue(row, ["描述", "description", "Описание"]) || "").trim(),\n      price: String(rowValue(row, ["售价", "价格", "price", "Цена"]) || "").trim(),', '      description: String(rowValue(row, ["描述", "description", "Описание"]) || "").trim(),\n      purchaseCost: String(rowValue(row, ["成本", "采购成本", "进货价", "purchaseCost", "cost"]) || "").trim(),\n      targetGrossRate: String(rowValue(row, ["目标毛利率", "毛利率", "targetGrossRate", "grossRate"]) || draft.targetGrossRate || "65").trim(),\n      commissionRate: String(rowValue(row, ["平台扣点", "佣金率", "commissionRate", "commission"]) || draft.commissionRate || "12").trim(),\n      exchangeRate: String(rowValue(row, ["汇率", "exchangeRate", "rate"]) || draft.exchangeRate || "11.5").trim(),\n      price: String(rowValue(row, ["售价", "价格", "price", "Цена"]) || "").trim(),', 'batch cost fields');
          listing = mustReplace(listing, '      images: splitImageList(rowValue(row, ["图片", "图片URL", "images", "image", "image_url"])),\n    });', '      images: splitImageList(rowValue(row, ["图片", "图片URL", "images", "image", "image_url"])),\n      stockQty: String(rowValue(row, ["库存", "stock", "qty"]) || draft.stockQty || "20").trim(),\n    });', 'batch stock field');
          if (!listing.includes('function matchImagesForSku')) {
            listing = mustReplace(listing, '  async function importBatchDrafts(file) {', `  const normalizeSkuToken = (value) => String(value || "")\n    .toLowerCase()\n    .replace(/\\.[a-z0-9]+$/i, "")\n    .replace(/[^a-z0-9\\u4e00-\\u9fa5]+/g, "");\n\n  function fileToDataUrl(file) {\n    return new Promise((resolve, reject) => {\n      const reader = new FileReader();\n      reader.onload = () => resolve(reader.result);\n      reader.onerror = () => reject(reader.error || new Error(\`Failed to read \${file.name}\`));\n      reader.readAsDataURL(file);\n    });\n  }\n\n  async function buildImageIndex(files = []) {\n    const rows = [];\n    for (const file of files.filter((item) => /^image\\//i.test(item.type || ""))) {\n      if (file.size > 4 * 1024 * 1024) continue;\n      const path = file.webkitRelativePath || file.name || "";\n      rows.push({ file, path, nameKey: normalizeSkuToken(file.name), pathKey: normalizeSkuToken(path), dataUrl: await fileToDataUrl(file) });\n    }\n    return rows;\n  }\n\n  function matchImagesForSku(imageIndex, sku) {\n    const key = normalizeSkuToken(sku);\n    if (!key) return [];\n    return imageIndex\n      .filter((item) => item.nameKey.includes(key) || item.pathKey.includes(key))\n      .sort((a, b) => a.path.localeCompare(b.path, undefined, { numeric: true }))\n      .map((item) => item.dataUrl)\n      .slice(0, 15);\n  }\n\n  function finalizeImportedDraft(d, imageIndex, report) {\n    const matchedImages = matchImagesForSku(imageIndex, d.code);\n    if (matchedImages.length) {\n      const existing = new Set(d.images || []);\n      d.images = [...(d.images || []), ...matchedImages.filter((src) => !existing.has(src))].slice(0, 15);\n    }\n    if (!d.price && d.purchaseCost && d.weight) applyPricingToDraft(d);\n    if (!d.title) d.title = d.model || d.code;\n    if (!d.images?.length) report.missingImages.push(d.code || d.title || "untitled");\n    if (!d.price) report.pricingFailed.push(d.code || d.title || "untitled");\n    return d;\n  }\n\n  function renderImportReport(report) {\n    const box = $("lst_importReport");\n    if (!box) return;\n    box.innerHTML = \`\n      <strong>Imported \${report.imported} drafts</strong>\n      <span>Images matched: \${report.imageMatched}</span>\n      <span>Missing images: \${report.missingImages.length}</span>\n      <span>Pricing failed: \${report.pricingFailed.length}</span>\n      \${report.missingImages.length ? \`<small>Missing image SKU: \${escapeHtml(report.missingImages.slice(0, 12).join(", "))}</small>\` : ""}\n      \${report.pricingFailed.length ? \`<small>Pricing needs cost/weight: \${escapeHtml(report.pricingFailed.slice(0, 12).join(", "))}</small>\` : ""}\n    \`;\n  }\n\n  async function importBatchDrafts(file, imageFiles = []) {`, 'image import helpers');
          }
          listing = mustReplace(listing, '    if (!rows.length) throw new Error("表格没有可导入的数据行");\n    const groups = new Map();', '    if (!rows.length) throw new Error("表格没有可导入的数据行");\n    const imageIndex = await buildImageIndex(imageFiles);\n    const report = { imported: 0, imageMatched: 0, missingImages: [], pricingFailed: [] };\n    const groups = new Map();', 'image index');
          listing = mustReplace(listing, '    const imported = [...groupedDrafts, ...singles].filter((d) => d.code || d.title);', '    const imported = [...groupedDrafts, ...singles]\n      .filter((d) => d.code || d.title)\n      .map((d) => finalizeImportedDraft(d, imageIndex, report));\n    report.imported = imported.length;\n    report.imageMatched = imported.filter((d) => d.images?.length).length;', 'finalize import');
          listing = mustReplace(listing, '    renderDraftList();\n    log(`已批量导入 ${imported.length} 个草稿。`);', '    renderDraftList();\n    renderImportReport(report);\n    log(`已批量导入 ${imported.length} 个草稿。`);', 'render import report');
          listing = replaceRegex(listing, /    \$\("lst_batchImport"\)\?\.addEventListener\("click", \(\) => \$\("lst_batchFile"\)\?\.click\(\)\);[\s\S]*?    \$\("lst_batchPublish"\)\?\.addEventListener\("click", publishSelectedDrafts\);/, `    $("lst_batchImport")?.addEventListener("click", async () => {\n      const file = $("lst_batchFile")?.files?.[0];\n      const imageFiles = [...($("lst_batchImages")?.files || [])];\n      if (!file) { alert("Please choose a product spreadsheet first."); return; }\n      try {\n        const count = await importBatchDrafts(file, imageFiles);\n        alert(\`Imported \${count} listing drafts.\`);\n      } catch (err) {\n        alert("Batch import failed:" + (err.message || err));\n      }\n    });\n    $("lst_batchFile")?.addEventListener("change", async (e) => {\n      const file = e.target.files?.[0];\n      if (!file) return;\n      const report = $("lst_importReport");\n      if (report) report.textContent = \`已选择 \${file.name}。继续选择图片文件夹后，点击“导入商品包”。\`;\n    });\n    $("lst_batchPublish")?.addEventListener("click", publishSelectedDrafts);`, 'batch import events');
          write(files.listing, listing);

          let css = read(files.css);
          if (!css.includes('.listing-package-import')) {
            css = mustReplace(css, '.listing-import-box {\n  border: 1px solid var(--line);\n  border-radius: var(--radius-sm);\n  padding: 14px;\n  margin-bottom: 14px;\n  background: #fff;\n}\n', `.listing-import-box {\n  border: 1px solid var(--line);\n  border-radius: var(--radius-sm);\n  padding: 14px;\n  margin-bottom: 14px;\n  background: #fff;\n}\n.listing-package-import {\n  border: 1px solid var(--line);\n  border-radius: var(--radius-sm);\n  padding: 14px;\n  margin: 12px 0 14px;\n  background: #fff;\n}\n.listing-package-import .toolbar {\n  align-items: flex-start;\n}\n.listing-import-report {\n  display: flex;\n  flex-wrap: wrap;\n  gap: 8px 14px;\n  margin-top: 10px;\n  color: var(--ink-2);\n  font-size: 12px;\n}\n.listing-import-report strong {\n  color: var(--ink-1);\n}\n.listing-import-report small {\n  flex-basis: 100%;\n  color: var(--muted);\n}\n`, 'package import css');
          }
          write(files.css, css);

          let api = read(files.api);
          api = mustReplace(api, '    id: String(node.id ?? node.objectID ?? ""),\n    name: String(node.name ?? node.objectName ?? ""),', '    id: String(node.id ?? node.objectID ?? ""),\n    categoryId: Number(node.id ?? node.objectID ?? 0),\n    subjectID: Number(node.id ?? node.objectID ?? 0),\n    name: String(node.name ?? node.objectName ?? ""),', 'WB category ids');
          if (!api.includes('source: "wb-subject"')) {
            api = mustReplace(api, '  const force = searchParams.get("force") === "1";\n  if (!categoryId || !typeId) return { ok: false, error: "缺少 categoryId 或 typeId" };', '  const force = searchParams.get("force") === "1";\n  if (platform === "wb") {\n    if (!categoryId) return { ok: false, error: "缺少 WB subject/object ID" };\n    return { ok: true, attributes: [], source: "wb-subject", categoryId, typeId: 0, total: 0, required: 0 };\n  }\n  if (!categoryId || !typeId) return { ok: false, error: "缺少 categoryId 或 typeId" };', 'WB attr endpoint');
          }
          api = replaceRegex(api, /async function publishWBProduct\(env, store, draft\) \{[\s\S]*?\n\}\n\nasync function publish\(/, `async function publishWBProduct(env, store, draft) {\n  const subjectID = Number(draft.descriptionCategoryId || draft.categoryId || 0);\n  if (!subjectID) return { ok: false, error: "缺少 WB 类目 subject/object ID" };\n  const baseSku = String(draft.offerId || draft.code || \`SKU-\${Date.now()}\`).trim();\n  const sourceVariants = Array.isArray(draft.variants) && draft.variants.length\n    ? draft.variants\n    : [{ offerId: baseSku, price: draft.price, oldPrice: draft.oldPrice, stock: draft.stockQty, values: {}, images: draft.images }];\n  const dimensions = {\n    length: Math.max(1, Math.round(amount(draft.length) / 10)),\n    width: Math.max(1, Math.round(amount(draft.width) / 10)),\n    height: Math.max(1, Math.round(amount(draft.height) / 10)),\n    weightBrutto: Math.max(0.01, Math.round((amount(draft.weight) / 1000) * 1000) / 1000),\n  };\n  const body = [{\n    subjectID,\n    variants: sourceVariants.map((variant, index) => {\n      const sku = String(variant.offerId || variant.vendorCode || \`${baseSku}-\${index + 1}\`).trim();\n      const characteristics = Object.entries(variant.values || {})\n        .filter(([, value]) => String(value || "").trim())\n        .map(([name, value]) => ({ name, value: String(value).trim() }));\n      return {\n        vendorCode: sku,\n        title: String(draft.title || draft.model || sku).slice(0, 100),\n        description: String(draft.description || draft.sellingPoints || "").slice(0, 5000),\n        brand: String(draft.brand || "Нет бренда").slice(0, 50),\n        dimensions,\n        characteristics,\n        sizes: [{ techSize: "0", wbSize: "", price: Math.max(1, Math.round(amount(variant.price || draft.price))), skus: [String(variant.barcode || sku).slice(0, 30)] }],\n      };\n    }),\n  }];\n  const response = await fetch("https://content-api.wildberries.ru/content/v2/cards/upload", {\n    method: "POST",\n    headers: { Authorization: store.token, "content-type": "application/json" },\n    body: JSON.stringify(body),\n  });\n  const text = await response.text();\n  let payload = null;\n  try { payload = JSON.parse(text); } catch { payload = null; }\n  if (!response.ok) return { ok: false, status: response.status, error: payload?.errorText || payload?.detail || text.slice(0, 300), request: body };\n  const error = payload?.errorText || payload?.detail || payload?.data?.errorText || "";\n  return { ok: !payload?.error, error, offerId: baseSku, offerIds: sourceVariants.map((variant, index) => String(variant.offerId || \`${baseSku}-\${index + 1}\`)), subjectID, itemCount: sourceVariants.length, imagesPending: (draft.images || []).length, raw: payload };\n}\n\nasync function publish(`, 'WB publish payload');
          api = replaceRegex(api, /  if \(platform !== "ozon"\) return \{ ok: true, platform, checks: \[\{ key: "platform", label: "平台", ok: true, detail: "WB uses card upload" \}\] \};/, `  if (platform === "wb") {\n    const variants = Array.isArray(draft.variants) && draft.variants.length ? draft.variants : [{ offerId: draft.offerId || draft.code, price: draft.price }];\n    const checks = [\n      { key: "subject", label: "WB 类目", ok: Boolean(Number(draft.descriptionCategoryId || draft.categoryId || 0)), detail: draft.categoryFullPath || draft.categoryId || "" },\n      { key: "sku", label: "货号", ok: Boolean(String(draft.offerId || draft.code || "").trim()), detail: draft.offerId || draft.code || "" },\n      { key: "title", label: "标题", ok: Boolean(String(draft.title || "").trim()), detail: String(draft.title || "").slice(0, 80) },\n      { key: "price", label: "售价", ok: amount(draft.price) > 0 || variants.every((variant) => amount(variant.price) > 0), detail: draft.price || "variant prices" },\n      { key: "weight", label: "重量", ok: amount(draft.weight) > 0, detail: \`${draft.weight || 0}g\` },\n      { key: "images", label: "图片", ok: Array.isArray(draft.images) && draft.images.length > 0, detail: \`${(draft.images || []).length} image(s), media upload follows card creation\` },\n    ];\n    return { ok: checks.every((check) => check.ok), platform, offerId: draft.offerId || draft.code || "", itemCount: variants.length, checks };\n  }`, 'WB preflight');
          write(files.api, api);

          for (const [label, path] of Object.entries(files)) {
            const text = read(path);
            if (!text || text.includes('undefined count')) throw new Error(`${label} verification failed`);
          }
          NODE
      - name: Commit patch
        shell: bash
        run: |
          rm -f .github/workflows/codex-wb-semi-auto.yml
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add scripts/listing.js functions/api/listing/[[path]].js styles/main.css .github/workflows/codex-wb-semi-auto.yml
          git commit -m "Add WB semi-automated listing import"
          git push
